---
# Creates a dockerconfigjson imagePullSecret named `ghcr` in the platform namespace
# so k3s can pull private images from ghcr.io/omar-massfih/*.
- name: Read ghcr PAT from local file
  delegate_to: localhost
  become: false
  ansible.builtin.slurp:
    src: "{{ ghcr_pat_file }}"
  register: ghcr_pat_raw

- name: Create ghcr imagePullSecret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ghcr
        namespace: "{{ k3s_namespace }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ dockerconfig | to_json | b64encode }}"
  vars:
    ghcr_pat: "{{ (ghcr_pat_raw.content | b64decode) | trim }}"
    dockerconfig:
      auths:
        ghcr.io:
          username: "{{ ghcr_org }}"
          password: "{{ ghcr_pat }}"
          auth: "{{ (ghcr_org ~ ':' ~ ghcr_pat) | b64encode }}"
