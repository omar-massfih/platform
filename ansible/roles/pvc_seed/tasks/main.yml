---
# Seed the writable `codex-auth` PVC from the `codex-auth` Secret exactly once.
# Codex rotates its refresh token in place, so auth.json must live on a writable
# volume (PVC) rather than a read-only Secret mount. We run a one-shot Job that
# copies the Secret contents into the PVC only if it's empty.
- name: Ensure codex-auth PVC exists
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    src: "{{ playbook_dir }}/../../k8s/platform/codex-auth-pvc.yaml"

- name: Run one-shot seed Job
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: codex-auth-seed
        namespace: "{{ k3s_namespace }}"
      spec:
        ttlSecondsAfterFinished: 120
        backoffLimit: 1
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: seed
                image: busybox:1.36
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    if [ ! -s /pvc/auth.json ]; then
                      cp /secret/auth.json /pvc/auth.json
                      echo "seeded"
                    else
                      echo "already present, skipping"
                    fi
                volumeMounts:
                  - { name: pvc, mountPath: /pvc }
                  - { name: secret, mountPath: /secret, readOnly: true }
            volumes:
              - name: pvc
                persistentVolumeClaim:
                  claimName: codex-auth
              - name: secret
                secret:
                  secretName: codex-auth

- name: Wait for seed Job to complete
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ k3s_namespace }}
    wait --for=condition=complete job/codex-auth-seed --timeout=120s
  changed_when: false
