apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

# Reconciled by Flux (clusters/omar/flux-system). Only components with a published
# image are enabled. Uncomment each app as its image lands in ghcr (or is imported
# into containerd), then commit — Flux applies it automatically.
resources:
  - platform/namespace.yaml
  - platform/codex-auth-pvc.yaml
  - apps/agentic-assistent
  - apps/chatgpt-proxy
  - apps/chatgpt-browser
  - apps/pr-pilot
  - apps/pr-pilot-omarmassfih

# All images pulled from ghcr, pinned to a build tag. Bump these (and push new
# images) to roll out a new version; Flux applies the change.
images:
  - name: ghcr.io/omar-massfih/agentic-assistent
    newTag: "sha-4141df1"
  - name: ghcr.io/omar-massfih/chatgpt-proxy
    newTag: "20260720"
  - name: ghcr.io/omar-massfih/chatgpt-browser
    newTag: "20260720f"
  - name: ghcr.io/omar-massfih/pr-pilot
    newTag: "20260721"
