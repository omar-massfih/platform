apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

# Reconciled by Flux (clusters/omar/flux-system). Only components with a published
# image are enabled. Uncomment each app as its image lands in ghcr (or is imported
# into containerd), then commit — Flux applies it automatically.
resources:
  - platform/namespace.yaml
  - platform/codex-auth-pvc.yaml
  - apps/agentic-assistent
  - apps/chatgpt-proxy
  # - apps/chatgpt-browser
  # - apps/pr-pilot
  # - apps/pr-pilot-omarmassfih

# agentic-assistent currently runs from an image imported into containerd
# (imagePullPolicy: IfNotPresent). When ghcr publishing is wired up, pin a tag here:
#   kustomize edit set image ghcr.io/omar-massfih/agentic-assistent=...:<sha>
images:
  - name: ghcr.io/omar-massfih/agentic-assistent
    newTag: latest
