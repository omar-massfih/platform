apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-assistent
  labels: { app: agentic-assistent }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO volumes: don't run two pods at once
  selector:
    matchLabels: { app: agentic-assistent }
  template:
    metadata:
      labels: { app: agentic-assistent }
    spec:
      imagePullSecrets:
        - name: ghcr
      securityContext:
        fsGroup: 1000            # image runs as uid 1000 (assistant); own the PVCs
      containers:
        - name: app
          image: ghcr.io/omar-massfih/agentic-assistent:latest
          imagePullPolicy: Always   # pull from ghcr (pinned tag set in kustomization)
          ports:
            - containerPort: 8000
          env:
            - { name: STORAGE_BACKEND, value: postgres }
            - { name: FASTEMBED_CACHE_PATH, value: /app/models/fastembed }
            - { name: HOST, value: "0.0.0.0" }   # non-loopback bind requires API_TOKEN
            # LLM backend is Azure AI Foundry's OpenAI-compatible v1 surface
            # (model DeepSeek-V4-Pro), driven by the openai provider. Overrides
            # the secret's LLM_BASE_URL/LLM_MODEL (was the chatgpt-browser bridge).
            # The API key lives in the agentic-assistent secret (LLM_API_KEY).
            - { name: LLM_BASE_URL, value: "https://wakiru.services.ai.azure.com/openai/v1" }
            - { name: LLM_MODEL, value: "DeepSeek-V4-Pro" }
            # User asked to disable quiet hours entirely (2026-07-21) — empty
            # string disables the 22:00-07:30 default fallback (config.py
            # quiet_hours_default); no profile note currently states an
            # override, so this makes in_quiet_hours() always False.
            - { name: QUIET_HOURS_DEFAULT, value: "" }
          envFrom:
            - secretRef: { name: agentic-assistent }   # API_TOKEN, DATABASE_URL, tokens
          volumeMounts:
            - { name: memory, mountPath: /app/memory }
            - { name: models, mountPath: /app/models }
            - { name: codex-auth, mountPath: /home/assistant/.codex }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { memory: "4Gi" }   # fastembed model is memory-heavy at load
      volumes:
        - name: memory
          persistentVolumeClaim: { claimName: agentic-memory }
        - name: models
          persistentVolumeClaim: { claimName: agentic-models }
        - name: codex-auth
          persistentVolumeClaim: { claimName: codex-auth }
