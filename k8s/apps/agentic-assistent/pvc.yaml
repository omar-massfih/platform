apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentic-memory        # live prod state: SQLite + markdown notes
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentic-models        # ~2GB fastembed cache (rebuildable)
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
