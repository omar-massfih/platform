apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pr-pilot-omarmassfih-state       # ~/.pr-pilot-omarmassfih
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pr-pilot-omarmassfih-workspace   # ~/omarmassfih-ws (frontend/ + backend/)
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 3Gi } }
