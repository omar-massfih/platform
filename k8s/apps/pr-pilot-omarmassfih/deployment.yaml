apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-pilot-omarmassfih
  labels: { app: pr-pilot-omarmassfih }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: pr-pilot-omarmassfih }
  template:
    metadata:
      labels: { app: pr-pilot-omarmassfih }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: pr-pilot
          image: ghcr.io/omar-massfih/pr-pilot:latest
          imagePullPolicy: IfNotPresent
          # omarmassfih.no group instance: same image, own config toml + Telegram bot.
          args: ["--config", "pr-pilot-omarmassfih.toml", "telegram"]
          env:
            - { name: CODEX_HOME, value: /home/omar/.codex }
          envFrom:
            - secretRef: { name: pr-pilot-omarmassfih }   # OMARMASSFIH_BOT_TOKEN, GH_TOKEN
          volumeMounts:
            - { name: state, mountPath: /home/omar/.pr-pilot-omarmassfih }
            - { name: workspace, mountPath: /home/omar/omarmassfih-ws }
            - { name: codex-auth, mountPath: /home/omar/.codex }
            - { name: config, mountPath: /home/omar/pr-pilot-omarmassfih.toml, subPath: pr-pilot-omarmassfih.toml }
            - { name: config, mountPath: /home/omar/.config/opencode/opencode.json, subPath: opencode.json }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "2Gi" }
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: pr-pilot-omarmassfih-state }
        - name: workspace
          persistentVolumeClaim: { claimName: pr-pilot-omarmassfih-workspace }
        - name: codex-auth
          persistentVolumeClaim: { claimName: codex-auth }
        - name: config
          configMap: { name: pr-pilot-config }
