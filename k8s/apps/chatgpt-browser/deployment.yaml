apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-browser
  labels: { app: chatgpt-browser }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: chatgpt-browser }
  template:
    metadata:
      labels: { app: chatgpt-browser }
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: browser
          image: ghcr.io/omar-massfih/chatgpt-browser:latest
          imagePullPolicy: Always   # pull from ghcr
          # Headless chromium bridge (chatgpt.com web -> OpenAI chat-completions).
          # Session state comes from the chatgpt-browser-state Secret; /dev/shm
          # sized up so chromium doesn't crash.
          env:
            - { name: BROWSER_HOST, value: "0.0.0.0" }
            - { name: BROWSER_PORT, value: "8766" }
            - { name: HEADLESS, value: "1" }
            - { name: STATE, value: /state/chatgpt-state.json }
            # Drive a specific Custom GPT (CHAT_URL reads GIZMO_URL).
            - { name: GIZMO_URL, value: "https://chatgpt.com/g/g-6a5d3210a0988191bd2d01f3df2803af-api" }
          ports:
            - containerPort: 8766
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
            - { name: state, mountPath: /state, readOnly: true }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "1500Mi" }
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 256Mi }
        - name: state
          secret:
            secretName: chatgpt-browser-state
