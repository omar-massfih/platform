apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pr-pilot-state          # ~/.pr-pilot (runs/, config, logs)
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pr-pilot-workspace      # the wakiru git checkout it ships features into
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 3Gi } }
