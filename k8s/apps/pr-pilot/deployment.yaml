apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-pilot
  labels: { app: pr-pilot }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: pr-pilot }
  template:
    metadata:
      labels: { app: pr-pilot }
    spec:
      imagePullSecrets:
        - name: ghcr
      securityContext:
        fsGroup: 1000
      containers:
        - name: pr-pilot
          image: ghcr.io/omar-massfih/pr-pilot:latest
          # wakiru instance. Outbound only (Telegram long-poll + git push) — no port.
          args: ["telegram"]
          env:
            # Repoint opencode/pr-pilot from the old 127.0.0.1:8765 loopback to the
            # in-cluster proxy Service. The image's opencode.json must use this URL.
            - { name: CHATGPT_PROXY_BASE_URL, value: "http://chatgpt-proxy.platform.svc:8765/v1" }
            - { name: PR_PILOT_STATE_DIR, value: /home/app/.pr-pilot }
          envFrom:
            - secretRef: { name: pr-pilot }   # TELEGRAM_BOT_TOKEN, GH_TOKEN, GIT_AUTHOR_*
          volumeMounts:
            - { name: state, mountPath: /home/app/.pr-pilot }
            - { name: workspace, mountPath: /home/app/wakiru }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "2Gi" }
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: pr-pilot-state }
        - name: workspace
          persistentVolumeClaim: { claimName: pr-pilot-workspace }
