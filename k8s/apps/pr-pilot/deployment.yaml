apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-pilot
  labels: { app: pr-pilot }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO volumes + single Telegram poller
  selector:
    matchLabels: { app: pr-pilot }
  template:
    metadata:
      labels: { app: pr-pilot }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: pr-pilot
          image: ghcr.io/omar-massfih/pr-pilot:latest
          imagePullPolicy: IfNotPresent   # image imported into containerd (interim)
          # wakiru instance. Outbound only (Telegram long-poll + git push) — no port.
          # Default config file is ./pr-pilot.toml in the workdir (/home/omar).
          args: ["telegram"]
          env:
            - { name: CODEX_HOME, value: /home/omar/.codex }   # profile_provider=chatgpt
          envFrom:
            - secretRef: { name: pr-pilot }   # TELEGRAM_BOT_TOKEN, GH_TOKEN
          volumeMounts:
            - { name: state, mountPath: /home/omar/.pr-pilot }
            - { name: workspace, mountPath: /home/omar/wakiru }
            - { name: codex-auth, mountPath: /home/omar/.codex }
            - { name: config, mountPath: /home/omar/pr-pilot.toml, subPath: pr-pilot.toml }
            - { name: config, mountPath: /home/omar/.config/opencode/opencode.json, subPath: opencode.json }
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "2Gi" }
      volumes:
        - name: state
          persistentVolumeClaim: { claimName: pr-pilot-state }
        - name: workspace
          persistentVolumeClaim: { claimName: pr-pilot-workspace }
        - name: codex-auth
          persistentVolumeClaim: { claimName: codex-auth }
        - name: config
          configMap: { name: pr-pilot-config }
